services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: grounded-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: grounded
      POSTGRES_PASSWORD: grounded
      POSTGRES_DB: grounded
    ports:
      - "5432:5432"
    volumes:
      - grounded_pgdata:/var/lib/postgresql/data
      - ../db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grounded -d grounded"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  grounded_pgdata:
